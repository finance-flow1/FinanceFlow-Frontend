name: Frontend_CI

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "**"
      - ".github/workflows/frontend-ci.yml"

  pull_request:
    branches:
      - main
      - dev
    paths:
      - "**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write
  packages: read

jobs:
  ci:
    uses: finance-flow1/CI-CD-Templates/.github/workflows/common-ci.yml@main
    with:
      working_directory: .
      image_name: financeflow-frontend
      run_build: true
      docker_context: .
      dockerfile_path: Dockerfile
      service-name: financeflow-frontend
      sonar_project_key: FinanceFlow-Client
      # dev branch → base path /dev/ so SPA assets and router work at /dev
      # main branch → base path / (standard prod)
      docker_build_args: ${{ github.ref == 'refs/heads/dev' && 'BASE_PATH=/dev/' || 'BASE_PATH=/' }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
