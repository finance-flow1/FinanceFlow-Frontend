name: Frontend_CD

on:
workflow_run:
workflows:
- Frontend_CI
types:
- completed
branches:
- main
- dev

jobs:
cd:
if: ${{ github.event.workflow_run.conclusion == 'success' }}
uses: finance-flow1/CI-CD-Templates/.github/workflows/common-cd.yml@main
with:
service-name: financeflow-frontend
ci-workflow-name: Frontend_CI
secrets:
APP_ID: ${{ secrets.APP_ID }}
APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
MANIFEST_REPO: ${{ secrets.MANIFEST_REPO }}
